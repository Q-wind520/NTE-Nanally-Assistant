[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "NTE_Nanally_Assistant"
version = "0.1.0"
authors = [
    { name="Q-wind520", email="mg_fire1030@163.com" },
]
description = "NTE Nanally Assistant 为你轻松处理异环中的重复性劳动，拿到真正的劳动所得！"
readme = "README.md"
requires-python = ">=3.13.13"

# 这里是你的依赖项，如果你有 requirements.txt，可以在下面这行引用它
# dependencies = [
#     line.strip() for line in open("requirements.txt") if not line.startswith("#")
# ]

[tool.setuptools.packages.find]
where = ["src"]